<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DramaTime - Bio</title>
    <meta name="description" content="DramaTime - Escolha seu filme favorito e assista agora!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- UTMify -->
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(30, 0, 40, 0.5) 0%, transparent 70%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(168, 85, 247, 0.4);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 20px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ===== LOGO SECTION ===== */
        .logo-section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeSlideDown 1s ease-out forwards;
            opacity: 0;
        }

        .logo-placeholder {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #7e22ce, #d8b4fe);
            border: 2px solid rgba(168, 85, 247, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 30px rgba(168, 85, 247, 0.15),
                0 0 50px rgba(168, 85, 247, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .logo-placeholder:hover {
            transform: scale(1.03);
            box-shadow:
                0 0 50px rgba(168, 85, 247, 0.25),
                0 15px 50px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .logo-placeholder::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(168, 85, 247, 0.05) 50%,
                transparent 70%
            );
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(0deg); }
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            display: none;
        }

        .logo-text {
            display: none;
        }

        /* ===== APP TITLE ===== */
        .app-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #a855f7, #7e22ce, #d8b4fe);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeSlideDown 1s ease-out 0.2s forwards, gradientShift 4s ease infinite;
            opacity: 0;
            margin-bottom: 6px;
            text-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.2));
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .app-subtitle {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            animation: fadeSlideDown 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        /* ===== DIVIDER ===== */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #7e22ce, transparent);
            border-radius: 2px;
            margin-bottom: 35px;
            animation: fadeSlideDown 1s ease-out 0.5s forwards, glowPulse 2s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(168, 85, 247, 0.3); }
            50% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.6); }
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 4px;
            color: rgba(192, 132, 252, 0.9);
            margin-bottom: 25px;
            animation: fadeSlideDown 1s ease-out 0.6s forwards;
            opacity: 0;
        }

        /* ===== MOVIE GRID ===== */
        .movies-grid {
            display: flex;
            justify-content: center;
            flex-wrap: nowrap; /* Changed to nowrap to force side-by-side */
            gap: 16px;
            width: 100%;
            max-width: 480px; /* Increased to allow more space if needed */
        }

        /* ===== MOVIE CARD ===== */
        .movie-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            width: calc(50% - 8px); /* Take exactly half width minus gap */
            aspect-ratio: 2/3;
            background: #111;
            animation: fadeScaleUp 0.8s ease-out forwards;
            opacity: 0;
            transform: scale(0.85) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s ease;
            box-shadow:
                0 0 30px rgba(168, 85, 247, 0.15),
                0 0 0 1px rgba(168, 85, 247, 0.1);
        }

        .movie-card:nth-child(1) { animation-delay: 0.7s; }
        .movie-card:nth-child(2) { animation-delay: 0.8s; }

        @keyframes fadeScaleUp {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .movie-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow:
                0 15px 50px rgba(168, 85, 247, 0.25),
                0 0 0 2px rgba(168, 85, 247, 0.4),
                0 0 80px rgba(168, 85, 247, 0.1);
        }

        .movie-card:active {
            transform: scale(0.97);
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, filter 0.4s ease;
        }

        .movie-card:hover img {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        /* Movie overlay gradient */
        .movie-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(
                to top,
                rgba(168, 85, 247, 0.05) 50%,
                rgba(0, 0, 0, 0.6) 40%,
                transparent 100%
            );
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            transition: opacity 0.3s ease;
        }

        .movie-title {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .movie-genre {
            font-size: 11px;
            font-weight: 500;
            color: rgba(192, 132, 252, 0.9);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Play icon on hover */
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 50px;
            height: 50px;
            background: rgba(168, 85, 247, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
            opacity: 0;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
        }

        .play-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
            margin-left: 3px;
        }

        .movie-card:hover .play-icon {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* ===== GLOW RING on top corners ===== */
        .movie-card::after {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 16px;
            border: 2px solid transparent;
            background: linear-gradient(145deg, rgba(168, 85, 247, 0.3), transparent 50%) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .movie-card:hover::after {
            opacity: 1;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 50px;
            text-align: center;
            animation: fadeSlideDown 1s ease-out 1.4s forwards;
            opacity: 0;
        }

        .footer-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .footer-line {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.3), transparent);
            margin: 12px auto 0;
            border-radius: 1px;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 380px) {
            .movies-grid {
                gap: 12px;
            }
            .movie-card {
                width: calc(50% - 6px); /* Ajuste para gap de 12px */
            }

            .logo-placeholder {
                width: 150px;
                height: 150px;
            }

            .app-title {
                font-size: 38px;
            }

            .movie-title {
                font-size: 12px;
            }
        }

        @media (min-width: 600px) {
            .container {
                padding-top: 60px;
            }

            .movies-grid {
                max-width: 440px;
                gap: 22px;
            }
            .movie-card {
                width: calc(50% - 11px); /* Ajuste para gap de 22px */
            }

            .logo-placeholder {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- LOGO SECTION -->
        <div class="logo-section">
            <div class="logo-placeholder" id="logoPlaceholder">
                <!-- Logo do app -->
                <img src="img/logodramatime.webp" alt="DramaTime Logo" id="logoImg">
                <!-- Placeholder icon (visível até adicionar a logo) -->
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5">
                    <rect x="2" y="2" width="20" height="20" rx="4"/>
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M2 17l5-5 4 4 4-6 5 7"/>
                </svg>
                <span class="logo-text">Sua logo aqui</span>
            </div>
        </div>


        <p class="app-subtitle">Escolha seu filme</p>

        <!-- DIVIDER -->
        <div class="divider"></div>

        <!-- SECTION TITLE -->
        <p class="section-title">🎬 Em Destaque</p>

        <!-- MOVIE GRID -->
        <div class="movies-grid">
            <!-- FILME 1 -->
            <a href="#" class="movie-card" id="movie-1" onclick="selectMovie(1, event)">
                <img src="img/O REI DA PRISÃO DISFARCADO.webp" alt="O Rei da Prisão Disfarçado" loading="lazy">
                <div class="play-icon">
                    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                </div>
            </a>
            
            <!-- FILME 2 -->
            <a href="#" class="movie-card" id="movie-2" onclick="selectMovie(2, event)">
                <img src="img/Mãe Solteira em Fuga Segura em Seus Braços.webp" alt="Mãe Solteira em Fuga Segura em Seus Braços" loading="lazy">
                <div class="play-icon">
                    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                </div>
            </a>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p class="footer-text">DramaTime © 2026</p>
            <div class="footer-line"></div>
        </div>
    </div>

    <script>
        // ===== FLOATING PARTICLES =====
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 25;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                particle.style.width = (Math.random() * 3 + 1) + 'px';
                particle.style.height = particle.style.width;
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(particle);
            }
        }
        createParticles();

        // ===== LOGO DETECTION =====
        // Quando o usuário colocar a logo, ela aparece automaticamente
        const logoImg = document.getElementById('logoImg');
        logoImg.onload = function() {
            logoImg.style.display = 'block';
            document.querySelector('.logo-icon').style.display = 'none';
            document.querySelector('.logo-text').style.display = 'none';
        };

        // ===== MOVIE SELECTION =====
        // Configure os links dos filmes aqui:
        const movieLinks = {
            1: 'https://dramatime.site/orei/', // Link para: O Rei da Prisão Disfarçado
            2: 'https://dramatime.site/amae/', // Link para: Mãe Solteira em Fuga Segura em Seus Braços
        };

        function selectMovie(id, event) {
            event.preventDefault();

            const card = document.getElementById('movie-' + id);

            // Animação de clique
            card.style.transform = 'scale(0.93)';
            card.style.transition = 'transform 0.15s ease';

            setTimeout(() => {
                card.style.transform = '';
                card.style.transition = '';

                // Redireciona para a página do filme
                const link = movieLinks[id];
                if (link && link !== '#') {
                    // Pega os parâmetros da URL atual
                    const currentParams = new URLSearchParams(window.location.search);
                    const url = new URL(link);
                    // Mescla os parâmetros atuais com os do link de destino
                    currentParams.forEach((value, key) => {
                        url.searchParams.set(key, value);
                    });
                    window.location.href = url.toString();
                } else {
                    // Efeito de feedback quando não há link
                    card.style.boxShadow = '0 0 40px rgba(168, 85, 247, 0.6), 0 0 0 3px rgba(168, 85, 247, 0.5)';
                    setTimeout(() => {
                        card.style.boxShadow = '';
                    }, 600);
                }
            }, 200);
        }

        // ===== INTERSECTION OBSERVER (re-animate on scroll) =====
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = 'running';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.movie-card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
